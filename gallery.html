<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="scripts/viewport-zoom.js"></script>
  <title>Ricercar — Gallery</title>
  <link rel="stylesheet" type="text/css" href="css/layout.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,1,0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
  <div class="page-container">
  <header class="header" id="header">
    <div id="nav-container"></div>
    <div class="container" style="background-color: rgba(117,91,27,0.5); height: 1px; margin: 0 50px"></div>
  </header>

  <main>
    <section class="section active" id="gallery">
      <div class="container" style="width: 100%; background-color: white; padding: 1px 20px; border-radius: 10px">
        <p style="font-family: 'Ubuntu Mono', monospace">I enjoy exploring graphic design, 3D rendering and photography in my spare time. </p>
      </div>

      <div class="gallery-filter-bar"></div>

      <div class="gallery-masonry"></div>
    </section>
  </main>

  <script src="scripts/nav-loader.js"></script>
  <script src="scripts/script.js"></script>
  <script src="scripts/router.js"></script>
</body>
</html>
