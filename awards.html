<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ricercar — Awards</title>
  <link rel="stylesheet" type="text/css" href="css/layout.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,1,0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
  <div class="page-container">
  <header class="header" id="header">
    <div id="nav-container"></div>
    <div class="container" style="background-color: rgba(117,91,27,0.5); height: 1px; margin: 0 50px"></div>
  </header>

  <main>
    <section class="section active" id="awards">
      <div class="page" style="gap: 0">
        <div class="grid-title">
          <h1>Academic Awards& Honors</h1>
        </div>
        <div class="column">
          <div class="grid">
            <div class="grid-item">
              <div class="column">
                <img class="img" src="resources/Awards/symposium.jpg" alt="...">
              </div>
              <div class="column">
                <div class="expander-badge">2022/11</div>
                <h2>Best Presentation in STEM&Media</h2>
                <p>Undergrad. Research Symposium, NYU Shanghai</p>
              </div>
            </div>

            <div class="grid-item">
              <div class="column">
                <a class="img" style="padding: 20px; font-size: 24px;">Dean's List for Academic Year</a>
              </div>
              <div class="column">
                <div class="expander-badge">2021-2023</div>
                <h2>Dean's List for Academic Year</h2>
                <p>NYU Shanghai</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="page" style="gap: 0">
        <div class="grid-title">
          <h1>Competition Awards</h1>
        </div>
        <div class="column">
          <div class="grid">
            <div class="grid-item">
              <div class="column">
                <img class="img" src="resources/Awards/DIC-2.png" alt="...">
              </div>
              <div class="column">
                <div class="expander-badge">2021/11</div>
                <h2>Best Innovation Award</h2>
                <p>Digital Innovation Competition, NYU Shanghai</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="scripts/nav-loader.js"></script>
  <script src="scripts/script.js"></script>
</body>
</html>
